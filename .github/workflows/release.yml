name: Release

# Manual trigger ONLY — this workflow has no push/schedule trigger, so it never runs unless
# someone explicitly starts it from the Actions tab ("Run workflow") or `gh workflow run
# release.yml`. Builds VST3 for macOS/Windows/Linux (+ AU on macOS), zips one archive per
# platform, and publishes them to a GitHub Release tagged from the version in CMakeLists.txt.
#
# macOS artifacts are signed with a Developer ID Application certificate and notarized via
# notarytool, using secrets configured in the repo (APPLE_CERT_P12_BASE64, APPLE_CERT_PASSWORD,
# APPLE_SIGNING_IDENTITY, APPLE_TEAM_ID, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD).
#
# Each platform also gets a basic installer built from installer/<platform>/ alongside the raw
# zip: a .pkg on macOS (with an AU/VST3 choice screen, both selected by default), a .exe on
# Windows (NSIS, VST3 only), and a .deb on Linux (VST3 only). The macOS .pkg wraps the already-
# signed-and-notarized AU/VST3 bundles, but the .pkg installer itself is NOT signed (that needs
# a separate "Developer ID Installer" cert, which isn't provisioned here) — Gatekeeper checks the
# bundles when a host loads them, not the installer wrapper, so this is fine for distribution,
# though double-clicking the .pkg directly may show an "unidentified developer" prompt.

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as a draft release (review before publishing)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        run: |
          VERSION=$(grep -oP '(?<=project\(Tommy VERSION )[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "Read version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  macos:
    name: macOS build
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build AU + VST3
        run: cmake --build build --config Release --target Tommy_AU --target Tommy_VST3 --parallel

      - name: Import signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign AU + VST3
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for bundle in \
            "build/Tommy_artefacts/Release/AU/Tommy.component" \
            "build/Tommy_artefacts/Release/VST3/Tommy.vst3"; do
            codesign --force --deep --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" --keychain "$KEYCHAIN_PATH" "$bundle"
            codesign --verify --deep --strict --verbose=2 "$bundle"
          done

      - name: Notarize AU + VST3
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize.zip"
          NOTARIZE_DIR="$RUNNER_TEMP/notarize"
          mkdir -p "$NOTARIZE_DIR"
          cp -R "build/Tommy_artefacts/Release/AU/Tommy.component" "$NOTARIZE_DIR/"
          cp -R "build/Tommy_artefacts/Release/VST3/Tommy.vst3" "$NOTARIZE_DIR/"
          ditto -c -k --keepParent "$NOTARIZE_DIR" "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "build/Tommy_artefacts/Release/AU/Tommy.component"
          xcrun stapler staple "build/Tommy_artefacts/Release/VST3/Tommy.vst3"

      - name: Package
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ditto -c -k --sequesterRsrc --keepParent \
            build/Tommy_artefacts/Release "Tommy-macOS-v${VERSION}.zip"

      - name: Build installer
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          installer/macos/build_installer.sh "$VERSION" build/Tommy_artefacts/Release .

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - uses: actions/upload-artifact@v6
        with:
          name: Tommy-macOS
          path: |
            Tommy-macOS-v*.zip
            Tommy-macOS-v*.pkg

  windows:
    name: Windows build
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build

      - name: Build VST3
        run: cmake --build build --config Release --target Tommy_VST3 --parallel

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          Compress-Archive -Path "build/Tommy_artefacts/Release/VST3/Tommy.vst3" `
            -DestinationPath "Tommy-Windows-v$version.zip"

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"

          $makensis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if ($makensis) {
            $makensisPath = $makensis.Source
          } else {
            $candidates = @(
              "$env:ProgramFiles\NSIS\makensis.exe",
              "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
            )
            $makensisPath = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          if (-not $makensisPath) {
            Write-Host "makensis not found on this runner — installing via Chocolatey"
            choco install nsis -y --no-progress
            $makensisPath = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          }

          Write-Host "Using makensis at $makensisPath"
          & $makensisPath /DVERSION=$version /DARTEFACTS_DIR="$PWD\build\Tommy_artefacts\Release\VST3" installer\windows\Tommy.nsi

          # NSIS resolves a relative OutFile against the .nsi's own directory, not this process's
          # CWD — move the built installer to the repo root so the upload-artifact glob finds it.
          Move-Item "installer\windows\Tommy-Windows-v$version-Installer.exe" .

      - uses: actions/upload-artifact@v6
        with:
          name: Tommy-Windows
          path: |
            Tommy-Windows-v*.zip
            Tommy-Windows-v*.exe

  linux:
    name: Linux build
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev mesa-common-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target Tommy_VST3 --parallel

      - name: Package
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          (cd build/Tommy_artefacts/Release/VST3 && zip -r "${GITHUB_WORKSPACE}/Tommy-Linux-v${VERSION}.zip" Tommy.vst3)

      - name: Build installer
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          installer/linux/build_deb.sh "$VERSION" build/Tommy_artefacts/Release .

      - uses: actions/upload-artifact@v6
        with:
          name: Tommy-Linux
          path: |
            Tommy-Linux-v*.zip
            Tommy-Linux-v*.deb

  publish:
    name: Publish release
    needs: [version, macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Tommy v${{ needs.version.outputs.version }}
          draft: ${{ inputs.draft }}
          files: |
            artifacts/**/*.zip
            artifacts/**/*.pkg
            artifacts/**/*.exe
            artifacts/**/*.deb
